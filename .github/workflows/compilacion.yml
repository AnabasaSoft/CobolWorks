name: Compilar CobolWorks (Linux y Windows)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar dependencias (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake qt6-base-dev libqscintilla2-qt6-dev gnucobol gdb rpm

      - name: Configurar CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Compilar
        run: cmake --build build --config Release -j 4

      - name: Generar Paquetes (DEB, RPM, TGZ)
        working-directory: build
        run: cpack

      - name: Subir artefactos Linux
        uses: actions/upload-artifact@v4
        with:
          name: CobolWorks-Linux
          path: build/CobolWorks-1.0.0-*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Entorno MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # --- CAMBIO: Añadimos imagemagick a la lista ---
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qscintilla-qt6
            mingw-w64-x86_64-gnucobol
            mingw-w64-x86_64-imagemagick

      - name: Configurar y Compilar con MinGW
        shell: msys2 {0}
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Empaquetar dependencias y aislar binarios
        shell: msys2 {0}
        run: |
          windeployqt build/CobolWorks.exe
          mkdir -p build/Release-Windows
          cp build/CobolWorks.exe build/Release-Windows/
          cp build/*.dll build/Release-Windows/ || true
          cp -r build/platforms build/Release-Windows/ || true
          cp -r build/styles build/Release-Windows/ || true
          cp -r build/imageformats build/Release-Windows/ || true
          cp -r build/tls build/Release-Windows/ || true
          cp -r build/idiomas build/Release-Windows/ || true

      # --- NUEVO: Convertir Icono PNG a ICO automático ---
      - name: Convertir Icono PNG a ICO (para el instalador)
        shell: msys2 {0}
        run: magick convert icon.png -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Crear Instalador (Inno Setup)
        run: iscc instalador.iss

      - name: Subir Instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: CobolWorks-Windows-Installer
          path: Output/CobolWorks-Windows-Installer.exe
